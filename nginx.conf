server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Routing de SPA: cualquier ruta que no sea un archivo real cae en index.html
  # (sin esto, recargar /caja, /dashboard, etc. daría 404).
  location / {
    try_files $uri $uri/ /index.html;
  }

  # index.html nunca se cachea: así los usuarios siempre reciben la última versión
  # que apunta a los bundles nuevos.
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  # Bundles hasheados (js/css/imágenes/fuentes): cache larga e inmutable.
  location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|ico|webp|woff|woff2|ttf|eot)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Compresión
  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;
}
